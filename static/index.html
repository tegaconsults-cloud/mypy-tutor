<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MyPy Tutor</title>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/python.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── Header ── */
    header {
      width: 100%;
      max-width: 900px;
      padding: 14px 20px;
      border-bottom: 1px solid #2d3748;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }
    header .logo { font-size: 1.4rem; font-weight: 700; color: #63b3ed; }
    header .subtitle { font-size: 0.82rem; color: #718096; }

    /* Topic selector */
    #topic-selector {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }
    #topic-selector label { font-size: 0.82rem; color: #718096; white-space: nowrap; }
    #topic-select {
      background: #1a202c;
      border: 1px solid #2d3748;
      color: #e2e8f0;
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 0.82rem;
      cursor: pointer;
      outline: none;
      max-width: 180px;
    }
    #topic-select:focus { border-color: #4299e1; }
    #clear-btn {
      background: transparent;
      border: 1px solid #2d3748;
      color: #718096;
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 0.82rem;
      cursor: pointer;
      white-space: nowrap;
      transition: border-color 0.15s, color 0.15s;
    }
    #clear-btn:hover { border-color: #fc8181; color: #fc8181; }

    /* ── Chat ── */
    #chat-container {
      flex: 1;
      width: 100%;
      max-width: 900px;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }
    .welcome { text-align: center; padding: 40px 20px; color: #718096; }
    .welcome h2 { font-size: 1.2rem; color: #a0aec0; margin-bottom: 8px; }
    .welcome p { font-size: 0.9rem; line-height: 1.6; }

    /* Messages */
    .message { display: flex; flex-direction: column; max-width: 82%; }
    .message.user { align-self: flex-end; align-items: flex-end; }
    .message.assistant { align-self: flex-start; align-items: flex-start; }
    .message .label {
      font-size: 0.72rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.05em; margin-bottom: 4px; color: #718096;
    }
    .message.user .label { color: #63b3ed; }
    .message.assistant .label { color: #68d391; }

    .bubble {
      padding: 12px 16px; border-radius: 12px;
      line-height: 1.6; font-size: 0.95rem; word-break: break-word;
    }
    .message.user .bubble {
      background: #2b4a7a; color: #e2e8f0; border-bottom-right-radius: 4px;
    }
    .message.assistant .bubble {
      background: #1a202c; border: 1px solid #2d3748;
      color: #e2e8f0; border-bottom-left-radius: 4px; max-width: 100%;
    }
    .message.error .bubble {
      background: #3b1a1a; border: 1px solid #742a2a; color: #fc8181;
    }

    /* Markdown styles */
    .bubble h1, .bubble h2, .bubble h3, .bubble h4 { margin: 12px 0 6px; color: #90cdf4; }
    .bubble h1 { font-size: 1.2rem; } .bubble h2 { font-size: 1.1rem; } .bubble h3 { font-size: 1rem; }
    .bubble p { margin: 6px 0; }
    .bubble ul, .bubble ol { margin: 6px 0 6px 20px; }
    .bubble li { margin: 3px 0; }
    .bubble strong { color: #fbd38d; }
    .bubble em { color: #b794f4; }
    .bubble code:not(pre code) {
      background: #2d3748; color: #f6ad55; padding: 2px 5px;
      border-radius: 4px; font-family: "Fira Code", Consolas, monospace; font-size: 0.88em;
    }
    .bubble pre { margin: 10px 0; border-radius: 8px; overflow: hidden; position: relative; }
    .bubble pre code {
      font-family: "Fira Code", Consolas, monospace; font-size: 0.88em;
      display: block; padding: 14px 16px; overflow-x: auto;
    }
    .bubble blockquote { border-left: 3px solid #4a5568; padding-left: 12px; color: #a0aec0; margin: 8px 0; }
    .bubble hr { border: none; border-top: 1px solid #2d3748; margin: 10px 0; }

    /* Copy button on code blocks */
    .code-wrapper { position: relative; margin: 10px 0; }
    .copy-btn {
      position: absolute; top: 8px; right: 8px;
      background: #2d3748; color: #a0aec0; border: none;
      border-radius: 5px; padding: 3px 8px; font-size: 0.75rem;
      cursor: pointer; opacity: 0; transition: opacity 0.15s, background 0.15s;
      z-index: 1;
    }
    .code-wrapper:hover .copy-btn { opacity: 1; }
    .copy-btn:hover { background: #4a5568; color: #e2e8f0; }
    .copy-btn.copied { background: #276749; color: #68d391; opacity: 1; }

    /* Intent badge */
    .intent-badge {
      display: inline-block; font-size: 0.7rem; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.06em;
      padding: 2px 7px; border-radius: 999px; margin-bottom: 5px;
    }
    .intent-concept  { background: #2c5282; color: #90cdf4; }
    .intent-debug    { background: #742a2a; color: #fc8181; }
    .intent-codegen  { background: #276749; color: #68d391; }
    .intent-exercise { background: #553c9a; color: #d6bcfa; }
    .intent-ambiguous{ background: #4a5568; color: #e2e8f0; }

    /* Loading dots */
    .loading-dots {
      display: flex; gap: 5px; padding: 14px 16px;
      background: #1a202c; border: 1px solid #2d3748;
      border-radius: 12px; border-bottom-left-radius: 4px; width: fit-content;
    }
    .loading-dots span {
      width: 8px; height: 8px; background: #4a5568;
      border-radius: 50%; animation: bounce 1.2s infinite ease-in-out;
    }
    .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.7); opacity: 0.5; }
      40%            { transform: scale(1);   opacity: 1;   }
    }

    /* ── Input area ── */
    #input-area {
      width: 100%; max-width: 900px;
      padding: 10px 20px 16px;
      border-top: 1px solid #2d3748;
      display: flex; flex-direction: column; gap: 8px;
    }

    /* Code editor toggle */
    #editor-toggle {
      display: flex; align-items: center; gap: 8px;
    }
    #editor-toggle label { font-size: 0.8rem; color: #718096; cursor: pointer; user-select: none; }
    #code-editor-toggle {
      appearance: none; width: 34px; height: 18px;
      background: #2d3748; border-radius: 999px; cursor: pointer;
      position: relative; transition: background 0.2s; flex-shrink: 0;
    }
    #code-editor-toggle:checked { background: #3182ce; }
    #code-editor-toggle::after {
      content: ''; position: absolute; top: 2px; left: 2px;
      width: 14px; height: 14px; background: #e2e8f0;
      border-radius: 50%; transition: left 0.2s;
    }
    #code-editor-toggle:checked::after { left: 18px; }

    /* Code editor panel */
    #code-editor-panel {
      display: none; flex-direction: column; gap: 6px;
    }
    #code-editor-panel.visible { display: flex; }
    #code-editor-panel label { font-size: 0.8rem; color: #718096; }
    #code-input {
      background: #0d1117; border: 1px solid #2d3748; border-radius: 8px;
      color: #e2e8f0; font-family: "Fira Code", Consolas, monospace;
      font-size: 0.88rem; padding: 10px 14px; resize: vertical;
      min-height: 120px; max-height: 300px; outline: none;
      tab-size: 4; transition: border-color 0.15s;
    }
    #code-input:focus { border-color: #4299e1; }
    #code-input::placeholder { color: #4a5568; }

    /* Message row */
    #message-row { display: flex; gap: 10px; align-items: flex-end; }
    #message-input {
      flex: 1; background: #1a202c; border: 1px solid #2d3748;
      border-radius: 10px; color: #e2e8f0; font-size: 0.95rem;
      padding: 10px 14px; resize: none; min-height: 44px; max-height: 160px;
      line-height: 1.5; outline: none; transition: border-color 0.15s; font-family: inherit;
    }
    #message-input:focus { border-color: #4299e1; }
    #message-input::placeholder { color: #4a5568; }
    #send-btn {
      background: #3182ce; color: #fff; border: none; border-radius: 10px;
      padding: 10px 18px; font-size: 0.95rem; font-weight: 600;
      cursor: pointer; transition: background 0.15s, opacity 0.15s;
      white-space: nowrap; height: 44px;
    }
    #send-btn:hover:not(:disabled) { background: #2b6cb0; }
    #send-btn:disabled { opacity: 0.45; cursor: not-allowed; }

    /* Scrollbar */
    #chat-container::-webkit-scrollbar { width: 6px; }
    #chat-container::-webkit-scrollbar-track { background: transparent; }
    #chat-container::-webkit-scrollbar-thumb { background: #2d3748; border-radius: 3px; }
  </style>
</head>
<body>

  <header>
    <div>
      <div class="logo">🐍 MyPy Tutor</div>
      <div class="subtitle">Ask me anything about Python — concepts, debugging, code, exercises</div>
    </div>
    <div id="topic-selector">
      <label for="topic-select">Topic:</label>
      <select id="topic-select" aria-label="Select a topic">
        <option value="">— Browse topics —</option>
      </select>
      <button id="clear-btn" title="Clear chat history">Clear chat</button>
    </div>
  </header>

  <div id="chat-container">
    <div class="welcome">
      <h2>Welcome! I'm MyPy Tutor.</h2>
      <p>
        Ask me to <strong>explain a concept</strong>, <strong>debug your code</strong>,
        <strong>generate a snippet</strong>, or <strong>give you an exercise</strong>.<br />
        Use the <strong>topic dropdown</strong> to explore, or toggle the <strong>code editor</strong> to paste code.
      </p>
    </div>
  </div>

  <div id="input-area">
    <!-- Code editor toggle -->
    <div id="editor-toggle">
      <input type="checkbox" id="code-editor-toggle" aria-label="Toggle code editor" />
      <label for="code-editor-toggle">📝 Paste code for debugging</label>
    </div>

    <!-- Code editor panel -->
    <div id="code-editor-panel">
      <label for="code-input">Your Python code:</label>
      <textarea
        id="code-input"
        placeholder="# Paste your Python code here..."
        spellcheck="false"
        autocomplete="off"
      ></textarea>
    </div>

    <!-- Message input row -->
    <div id="message-row">
      <textarea
        id="message-input"
        placeholder="Ask a Python question…"
        rows="1"
        aria-label="Message input"
      ></textarea>
      <button id="send-btn" aria-label="Send message">Send</button>
    </div>
  </div>

  <script>
    const API_ENDPOINT = '/chat';
    const STORAGE_KEY  = 'mypy_tutor_history';

    // ── State ──────────────────────────────────────────────────────────────────
    /** @type {Array<{role: string, content: string}>} */
    let history = [];

    // ── DOM refs ───────────────────────────────────────────────────────────────
    const chatContainer     = document.getElementById('chat-container');
    const messageInput      = document.getElementById('message-input');
    const sendBtn           = document.getElementById('send-btn');
    const topicSelect       = document.getElementById('topic-select');
    const clearBtn          = document.getElementById('clear-btn');
    const codeEditorToggle  = document.getElementById('code-editor-toggle');
    const codeEditorPanel   = document.getElementById('code-editor-panel');
    const codeInput         = document.getElementById('code-input');

    // ── marked.js setup ────────────────────────────────────────────────────────
    marked.setOptions({ breaks: true, gfm: true });

    const renderer = new marked.Renderer();
    renderer.code = function (code, language) {
      const lang    = (typeof code === 'object') ? code.lang  : language;
      const content = (typeof code === 'object') ? code.text  : code;
      const validLang = lang && hljs.getLanguage(lang) ? lang : 'python';
      const highlighted = hljs.highlight(content, { language: validLang }).value;
      // Return placeholder — copy buttons injected after innerHTML is set
      return `<div class="code-wrapper"><pre><code class="hljs language-${validLang}">${highlighted}</code></pre><button class="copy-btn" data-code="${escAttr(content)}">Copy</button></div>`;
    };
    marked.use({ renderer });

    function escAttr(str) {
      return str.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    // ── Copy button handler (delegated) ───────────────────────────────────────
    chatContainer.addEventListener('click', (e) => {
      const btn = e.target.closest('.copy-btn');
      if (!btn) return;
      const code = btn.getAttribute('data-code')
        .replace(/&amp;/g,'&').replace(/&quot;/g,'"').replace(/&lt;/g,'<').replace(/&gt;/g,'>');
      navigator.clipboard.writeText(code).then(() => {
        btn.textContent = 'Copied!';
        btn.classList.add('copied');
        setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
      });
    });

    // ── Topic dropdown ─────────────────────────────────────────────────────────
    async function loadTopics() {
      try {
        const res = await fetch('/topics');
        const data = await res.json();
        data.topics.forEach(t => {
          const opt = document.createElement('option');
          opt.value = t;
          opt.textContent = t;
          topicSelect.appendChild(opt);
        });
      } catch (_) { /* silently ignore */ }
    }

    topicSelect.addEventListener('change', () => {
      const topic = topicSelect.value;
      if (!topic) return;
      messageInput.value = `Explain ${topic} in Python`;
      topicSelect.value = '';
      messageInput.focus();
    });

    // ── Code editor toggle ─────────────────────────────────────────────────────
    codeEditorToggle.addEventListener('change', () => {
      if (codeEditorToggle.checked) {
        codeEditorPanel.classList.add('visible');
        codeInput.focus();
      } else {
        codeEditorPanel.classList.remove('visible');
        codeInput.value = '';
      }
    });

    // Tab key inserts spaces in code editor
    codeInput.addEventListener('keydown', (e) => {
      if (e.key === 'Tab') {
        e.preventDefault();
        const s = codeInput.selectionStart;
        codeInput.value = codeInput.value.substring(0, s) + '    ' + codeInput.value.substring(s);
        codeInput.selectionStart = codeInput.selectionEnd = s + 4;
      }
    });

    // ── localStorage persistence ───────────────────────────────────────────────
    function saveHistory() {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(history)); } catch (_) {}
    }

    function loadHistory() {
      try {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (!saved) return;
        const parsed = JSON.parse(saved);
        if (!Array.isArray(parsed) || parsed.length === 0) return;
        history = parsed;
        removeWelcome();
        history.forEach(msg => {
          if (msg.role === 'user') {
            appendMessage('user', msg.content, null, false);
          } else if (msg.role === 'assistant') {
            // Try to parse stored intent from content prefix
            appendMessage('assistant', msg.content, msg.intent || null, false);
          }
        });
      } catch (_) { history = []; }
    }

    // ── Clear chat ─────────────────────────────────────────────────────────────
    clearBtn.addEventListener('click', () => {
      if (!confirm('Clear all chat history?')) return;
      history = [];
      try { localStorage.removeItem(STORAGE_KEY); } catch (_) {}
      chatContainer.innerHTML = `
        <div class="welcome">
          <h2>Welcome! I'm MyPy Tutor.</h2>
          <p>Ask me to <strong>explain a concept</strong>, <strong>debug your code</strong>,
          <strong>generate a snippet</strong>, or <strong>give you an exercise</strong>.</p>
        </div>`;
    });

    // ── Helpers ────────────────────────────────────────────────────────────────
    function scrollToBottom() { chatContainer.scrollTop = chatContainer.scrollHeight; }

    function removeWelcome() {
      const w = chatContainer.querySelector('.welcome');
      if (w) w.remove();
    }

    /**
     * @param {'user'|'assistant'|'error'} role
     * @param {string} text
     * @param {string|null} intent
     * @param {boolean} [save=true]
     */
    function appendMessage(role, text, intent = null, save = true) {
      removeWelcome();
      const wrapper = document.createElement('div');
      wrapper.classList.add('message', role);

      const label = document.createElement('div');
      label.className = 'label';
      label.textContent = role === 'user' ? 'You' : role === 'error' ? 'Error' : 'Tutor';
      wrapper.appendChild(label);

      if (role === 'assistant' && intent) {
        const badge = document.createElement('span');
        badge.className = `intent-badge intent-${intent}`;
        badge.textContent = intent;
        wrapper.appendChild(badge);
      }

      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      if (role === 'user' || role === 'error') {
        bubble.textContent = text;
      } else {
        bubble.innerHTML = marked.parse(text);
      }

      wrapper.appendChild(bubble);
      chatContainer.appendChild(wrapper);
      scrollToBottom();
      return wrapper;
    }

    function showLoading() {
      removeWelcome();
      const wrapper = document.createElement('div');
      wrapper.classList.add('message', 'assistant');
      const label = document.createElement('div');
      label.className = 'label';
      label.textContent = 'Tutor';
      wrapper.appendChild(label);
      const dots = document.createElement('div');
      dots.className = 'loading-dots';
      dots.innerHTML = '<span></span><span></span><span></span>';
      wrapper.appendChild(dots);
      chatContainer.appendChild(wrapper);
      scrollToBottom();
      return wrapper;
    }

    function setLoading(isLoading) {
      sendBtn.disabled = isLoading;
      messageInput.disabled = isLoading;
    }

    // ── Send logic ─────────────────────────────────────────────────────────────
    async function sendMessage() {
      let text = messageInput.value.trim();
      if (!text) return;

      // Append code block if code editor is open and has content
      const code = codeInput.value.trim();
      if (codeEditorToggle.checked && code) {
        text = `${text}\n\n\`\`\`python\n${code}\n\`\`\``;
      }

      appendMessage('user', text);
      history.push({ role: 'user', content: text });

      messageInput.value = '';
      messageInput.style.height = 'auto';
      if (codeEditorToggle.checked) {
        codeInput.value = '';
        codeEditorToggle.checked = false;
        codeEditorPanel.classList.remove('visible');
      }
      setLoading(true);
      const loadingEl = showLoading();

      try {
        const res = await fetch(API_ENDPOINT, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text, history: history.slice(0, -1) }),
        });

        loadingEl.remove();

        if (!res.ok) {
          let errMsg = `Server error (${res.status})`;
          try {
            const errData = await res.json();
            if (errData.detail) errMsg = errData.detail;
            else if (errData.error) errMsg = errData.error;
          } catch (_) {}
          appendMessage('error', errMsg);
          history.pop();
          return;
        }

        const data = await res.json();
        appendMessage('assistant', data.content, data.intent);
        history.push({ role: 'assistant', content: data.content, intent: data.intent });
        saveHistory();

      } catch (err) {
        loadingEl.remove();
        appendMessage('error', `Network error: ${err.message}`);
        history.pop();
      } finally {
        setLoading(false);
        messageInput.focus();
      }
    }

    // ── Event listeners ────────────────────────────────────────────────────────
    sendBtn.addEventListener('click', sendMessage);
    messageInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });
    messageInput.addEventListener('input', () => {
      messageInput.style.height = 'auto';
      messageInput.style.height = Math.min(messageInput.scrollHeight, 160) + 'px';
    });

    // ── Init ───────────────────────────────────────────────────────────────────
    loadTopics();
    loadHistory();
    messageInput.focus();
  </script>
</body>
</html>
