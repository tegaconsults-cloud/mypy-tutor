<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 120" width="320" height="120">
  <defs>
    <!-- Dark background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1f2e"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <!-- Gold gradient for letters -->
    <linearGradient id="gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8c97a"/>
      <stop offset="40%" style="stop-color:#c9a84c"/>
      <stop offset="100%" style="stop-color:#8b6914"/>
    </linearGradient>
    <!-- Copper/bronze for MPT letters -->
    <linearGradient id="copper" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d4a574"/>
      <stop offset="50%" style="stop-color:#b87333"/>
      <stop offset="100%" style="stop-color:#8b4513"/>
    </linearGradient>
    <!-- Snake green gradient -->
    <linearGradient id="snake" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a7c59"/>
      <stop offset="50%" style="stop-color:#2d5a3d"/>
      <stop offset="100%" style="stop-color:#1a3d28"/>
    </linearGradient>
    <!-- Snake highlight -->
    <linearGradient id="snakeHL" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6aaf7e;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#2d5a3d;stop-opacity:0"/>
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="goldshadow">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#c9a84c" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="320" height="120" fill="url(#bg)" rx="12"/>

  <!-- Bokeh light effects -->
  <circle cx="40" cy="20" r="18" fill="#c9a84c" opacity="0.08"/>
  <circle cx="290" cy="90" r="12" fill="#4a7c59" opacity="0.08"/>
  <circle cx="270" cy="15" r="8" fill="#c9a84c" opacity="0.06"/>

  <!-- ── MPT letters ── -->
  <!-- M -->
  <text x="30" y="72" font-family="Georgia,serif" font-size="58" font-weight="bold"
        fill="url(#copper)" filter="url(#goldshadow)" letter-spacing="-2">M</text>
  <!-- P -->
  <text x="90" y="72" font-family="Georgia,serif" font-size="58" font-weight="bold"
        fill="url(#copper)" filter="url(#goldshadow)">P</text>
  <!-- T -->
  <text x="158" y="72" font-family="Georgia,serif" font-size="58" font-weight="bold"
        fill="url(#copper)" filter="url(#goldshadow)">T</text>

  <!-- π symbol in gold (on the P-T gap) -->
  <text x="143" y="32" font-family="Georgia,serif" font-size="22" font-weight="bold"
        fill="url(#gold)" filter="url(#glow)">π</text>

  <!-- ── Python snake wrapping around MPT ── -->
  <!-- Snake body — S-curve from top-right down through the letters -->
  <path d="M 195 8 C 210 5, 220 12, 215 22 C 208 35, 195 30, 190 42
           C 184 55, 192 65, 185 75 C 178 85, 165 82, 162 72
           C 158 60, 168 52, 162 42 C 156 32, 140 35, 138 48"
        fill="none" stroke="url(#snake)" stroke-width="11" stroke-linecap="round"/>
  <!-- Snake highlight stripe -->
  <path d="M 195 8 C 210 5, 220 12, 215 22 C 208 35, 195 30, 190 42
           C 184 55, 192 65, 185 75 C 178 85, 165 82, 162 72
           C 158 60, 168 52, 162 42 C 156 32, 140 35, 138 48"
        fill="none" stroke="url(#snakeHL)" stroke-width="5" stroke-linecap="round" opacity="0.6"/>
  <!-- Snake scales pattern dots -->
  <circle cx="195" cy="10" r="1.5" fill="#6aaf7e" opacity="0.7"/>
  <circle cx="207" cy="17" r="1.5" fill="#6aaf7e" opacity="0.7"/>
  <circle cx="213" cy="26" r="1.5" fill="#6aaf7e" opacity="0.7"/>
  <circle cx="200" cy="34" r="1.5" fill="#6aaf7e" opacity="0.7"/>
  <circle cx="188" cy="44" r="1.5" fill="#6aaf7e" opacity="0.7"/>
  <circle cx="190" cy="56" r="1.5" fill="#6aaf7e" opacity="0.7"/>
  <circle cx="184" cy="67" r="1.5" fill="#6aaf7e" opacity="0.7"/>
  <circle cx="171" cy="77" r="1.5" fill="#6aaf7e" opacity="0.7"/>

  <!-- Snake head (top right, facing right) -->
  <ellipse cx="202" cy="6" rx="12" ry="7" fill="#3a6b47" transform="rotate(-20,202,6)"/>
  <ellipse cx="202" cy="6" rx="10" ry="5.5" fill="#4a7c59" transform="rotate(-20,202,6)"/>
  <!-- Eye -->
  <circle cx="208" cy="3" r="2.5" fill="#1a1a1a"/>
  <circle cx="208" cy="3" r="1.2" fill="#e8c97a"/>
  <circle cx="208.5" cy="2.5" r="0.5" fill="#fff"/>
  <!-- Forked tongue -->
  <path d="M 215 5 L 222 3 M 215 5 L 221 8" stroke="#c0392b" stroke-width="1.2" stroke-linecap="round" fill="none"/>

  <!-- ── Text below ── -->
  <!-- "mypytutor" in gold -->
  <text x="160" y="95" font-family="Georgia,serif" font-size="17" font-weight="bold"
        fill="url(#gold)" text-anchor="middle" letter-spacing="1" filter="url(#glow)">mypytutor</text>
  <!-- "python tutoring" subtitle -->
  <text x="160" y="112" font-family="Arial,sans-serif" font-size="9.5"
        fill="#a0aec0" text-anchor="middle" letter-spacing="2">python tutoring</text>

  <!-- Small 4-pointed star accent (bottom right) -->
  <path d="M 305 100 L 307 96 L 309 100 L 307 104 Z" fill="#c9a84c" opacity="0.7"/>
  <path d="M 303 100 L 307 98 L 311 100 L 307 102 Z" fill="#c9a84c" opacity="0.7"/>
</svg>
