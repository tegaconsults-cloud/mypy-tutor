services:
  - type: web
    name: mypy-tutor
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false          # set manually in Render dashboard
      - key: SESSION_SECRET
        sync: false          # random 32+ char string for session tokens
      - key: ADMIN_EMAIL
        sync: false          # admin login email — e.g. tega.com.ng@gmail.com
      - key: ADMIN_PASSWORD
        sync: false          # admin login password (plain text or SHA-256 hash)
      - key: GOOGLE_CLIENT_ID
        sync: false          # set manually in Render dashboard
      - key: GOOGLE_CLIENT_SECRET
        sync: false          # set manually in Render dashboard
      - key: EMAIL_HOST
        value: smtp.gmail.com
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_USER
        sync: false          # your Gmail address
      - key: EMAIL_PASS
        sync: false          # Gmail App Password (not your normal password)
      - key: EMAIL_FROM
        sync: false          # e.g. MyPy Tutor <your-gmail@gmail.com>
      - key: APP_URL
        value: https://mypytutor.onrender.com
      - key: PAYSTACK_SECRET_KEY
        sync: false          # Paystack secret key — set in Render dashboard
      - key: SUPABASE_URL
        sync: false          # https://<project-ref>.supabase.co
      - key: SUPABASE_ANON_KEY
        sync: false          # Supabase publishable anon key
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false          # Supabase service role key (server-side only)
      - key: GITHUB_CLIENT_ID
        sync: false          # GitHub OAuth App Client ID (optional)
      - key: GITHUB_CLIENT_SECRET
        sync: false          # GitHub OAuth App Client Secret (optional)
      - key: DB_PATH
        sync: false          # Optional: /data/mypytutor.db for persistent disk
    autoDeploy: true
