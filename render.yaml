services:
  - type: web
    name: mypy-tutor
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false          # set manually in Render dashboard
      - key: SESSION_SECRET
        sync: false          # random 32+ char string for session tokens
      - key: GOOGLE_CLIENT_ID
        sync: false          # set manually in Render dashboard
      - key: GOOGLE_CLIENT_SECRET
        sync: false          # set manually in Render dashboard
      - key: EMAIL_HOST
        value: smtp.gmail.com
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_USER
        sync: false          # your Gmail address
      - key: EMAIL_PASS
        sync: false          # Gmail App Password (not your normal password)
      - key: EMAIL_FROM
        sync: false          # e.g. MyPy Tutor <your-gmail@gmail.com>
      - key: APP_URL
        value: https://mypytutor.onrender.com
      - key: PAYSTACK_SECRET_KEY
        sync: false          # Paystack secret key — set in Render dashboard
    autoDeploy: true
